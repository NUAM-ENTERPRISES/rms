# Local development — hot reload, published ports, bind mounts.
# Usage: docker compose -f docker-compose.dev.yml up -d
# Or:    docker compose up -d  (via root docker-compose.yml include)

name: rms-dev

services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-affiniks_rms}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-affiniks_rms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rms-network

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rms-network

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-affiniks_rms}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: development
      NODE_OPTIONS: --max-old-space-size=4096
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - rms-network

  web:
    build:
      context: ./web
      target: dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_WS_URL: http://localhost:3000
      VITE_INTRO_VIDEO_DIRECT_UPLOAD: "false"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rms-network

volumes:
  postgres_data:
  backend_node_modules:
  web_node_modules:

networks:
  rms-network:
    driver: bridge
