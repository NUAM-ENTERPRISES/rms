name: Deploy RMS App

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Deploy Backend and Frontend
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
            
            mkdir -p /var/www/rms
            cd /var/www/rms

            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/NUAM-ENTERPRISES/rms.git

              git config core.sparseCheckout true

              echo backend/ >> .git/info/sparse-checkout
              echo frontend/ >> .git/info/sparse-checkout

              git pull origin main
            else
              git pull origin main
            fi

            # =========================
            # Backend Deployment
            # =========================
            cd /var/www/rms/backend

            npm install

            pm2 restart backend || pm2 start npm --name backend -- start

            # =========================
            # Frontend Deployment
            # =========================
            cd /var/www/rms/frontend

            npm install

            npm run build
          "
