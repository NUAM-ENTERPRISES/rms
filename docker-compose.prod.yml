# Production — compiled images, no bind mounts, internal DB/Redis.
# Usage: docker compose -f docker-compose.prod.yml --env-file backend/.env up -d --build

name: rms-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-affiniks_rms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-affiniks_rms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rms-network

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rms-network

  backend:
    build:
      context: ./backend
      target: prod
    restart: always
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-affiniks_rms}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      # Localhost only — host Nginx proxies here; blocks direct public IP access
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - rms-network

  web:
    build:
      context: ./web
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    restart: always
    ports:
      # 8080 on host — host nginx (443) proxies to this port
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rms-network

volumes:
  postgres_data:

networks:
  rms-network:
    driver: bridge
